name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sqlite3, zip

      - name: Lint PHP files
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            php -l "$f" || failed=1
          done < <(find . -name '*.php' -not -path './.github/*' -print0)
          exit $failed

      - name: Security scan - debug code
        run: |
          bad=$(grep -rn 'var_dump\|print_r\|phpinfo\|debug_backtrace\|xdebug_break' \
            --include='*.php' . \
            --exclude-dir=vendor --exclude-dir=.github 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "Found debug calls:"
            echo "$bad"
            exit 1
          fi

      - name: Security scan - hardcoded secrets
        run: |
          bad=$(grep -rn 'gsk_\|sk-[A-Za-z0-9]\|ghp_\|gho_\|ghu_\|ghs_\|ghr_' \
            --include='*.php' --include='*.js' . \
            --exclude-dir=vendor --exclude-dir=.github 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "Possible hardcoded secrets found:"
            echo "$bad"
            exit 1
          fi

      - name: Security scan - DEBUG flag
        run: |
          if grep -q 'DEBUG=true' .env 2>/dev/null; then
            echo "WARNING: .env has DEBUG=true — not suitable for production"
          fi
          # also check for DEBUG=true hardcoded in PHP files
          bad=$(grep -rn "define.*DEBUG.*true\|DEBUG.*=.*true" --include='*.php' . \
            --exclude-dir=vendor --exclude-dir=.github 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "DEBUG=true found in PHP files (should be false in production):"
            echo "$bad"
          fi

      - name: Check DB schema
        run: |
          cp .env.example .env 2>/dev/null || echo "GROQ_API_KEY=test" > .env
          mkdir -p sqlite logs
          php models/schema.php
          echo "DB initialized OK"

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject .env from secrets
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          mkdir -p sqlite logs
          php models/schema.php
          echo "DB ready for upload"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            .git/**
            .github/**
            .gitignore
            .env.example
            logs/*.log
            backups/**
            test_*.php
            *.tmp
